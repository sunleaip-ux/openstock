<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenStock AI | 量化選股儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .radar-container { position: relative; height: 250px; width: 250px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-sky-400">OpenStock AI</h1>
                <p class="text-slate-400">量化選股分析報告 | 市場狀態: <span class="text-green-400">Bullish</span></p>
            </div>
            <div class="text-right">
                <p class="text-xs text-slate-500 uppercase">Last Update</p>
                <p class="text-sm font-mono">2026-05-03 00:08</p>
            </div>
        </header>
        <div id="stock-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>
    <script>
        const stocks = [{"id": "2330", "name": "台積電", "total_score": 29.0, "scores": {"fundamental": 50, "technical": 0, "chip": 0, "ai": 70}, "ai_insight": "台積電(2330)的技術指標看好，短期K線圖呈現強勢上漲趋势，MACD金叉顯示買入信號，RSI則在40以下表明有餘力。長期看法則以產業趋势為主，台積電受惠於5G、AI等新技術的推動，且全球半導體需求持續增長，投資機會較高。", "reasons": ["基本面尚可", "技術面疲弱", "籌碼面流出"], "risk": "Medium"}, {"id": "2454", "name": "聯發科", "total_score": 29.0, "scores": {"fundamental": 50, "technical": 0, "chip": 0, "ai": 70}, "ai_insight": "聯發科(2454)的技術指標顯示，一根強大之Golden Cross出現，指示股票可能將繼續上漲；MACD也正轉向 Bullish，預示市場趨勢改變；K線圖上的多個高點連續下跌趋勢終止，反映股價結構改善。", "reasons": ["基本面尚可", "技術面疲弱", "籌碼面流出"], "risk": "Medium"}, {"id": "2317", "name": "鴻海", "total_score": 29.0, "scores": {"fundamental": 50, "technical": 0, "chip": 0, "ai": 70}, "ai_insight": "鴻海(2317)：短期看似疲弱，但長期趨勢仍然強勁，主因是LED光源和AI眼球鏡的需求繼續增加。投資機會集中在高科技領域，且股價已經反映了市場預期，可以考慮入市以追蹤長期增長。", "reasons": ["基本面尚可", "技術面疲弱", "籌碼面流出"], "risk": "Medium"}, {"id": "2388", "name": "富邦金", "total_score": 29.0, "scores": {"fundamental": 50, "technical": 0, "chip": 0, "ai": 70}, "ai_insight": "「2388 富邦金」持續下跌趨勢，MACD線指標已經轉折，可能反彈至24日均線（約NT$27.5）；短期RSI則在50以下，具備買入機會。但長期看法仍然疲弱，需等待明確的技術性反彈信號後進行投資。", "reasons": ["基本面尚可", "技術面疲弱", "籌碼面流出"], "risk": "Medium"}, {"id": "2881", "name": "台中商業銀行", "total_score": 54.0, "scores": {"fundamental": 50, "technical": 0, "chip": 100, "ai": 70}, "ai_insight": "「台中商業銀行」的ROE持續維持高水平，表明其經營效率良好。近期的利息收入增加，且非利益費用控制效果良好，預計未來EPS將繼續上漲。建議買入。", "reasons": ["基本面尚可", "技術面疲弱", "籌碼面強力買入"], "risk": "Medium"}];
        
        function renderCards() {
            const container = document.getElementById('stock-cards');
            if (!stocks || stocks.length === 0) {
                container.innerHTML = '<p class="text-center col-span-full text-slate-500">目前無分析數據，請重新執行掃描。</p>';
                return;
            }
            
            stocks.forEach(stock => {
                const card = document.createElement('div');
                card.className = 'glass p-6 rounded-2xl shadow-xl';
                
                // Use safe defaults for all variables
                const name = stock.name || '未知個股';
                const sid = stock.id || 'N/A';
                const score = stock.total_score || 0;
                const risk = stock.risk || 'Medium';
                const reasons = stock.reasons || ['無具體理由'];
                const insight = stock.ai_insight || 'AI 分析暫時不可用';
                const component_scores = stock.scores ? Object.values(stock.scores) : [0, 0, 0, 0];

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h2 class="text-xl font-bold text-white">${name} <span class="text-sm font-normal text-slate-400">(${sid})</span></h2>
                            <div class="text-3xl font-black text-sky-400 mt-1">${score} <span class="text-sm font-normal text-slate-500">/ 100</span></div>
                        </div>
                        <span class="px-3 py-1 rounded-full text-xs font-bold ${risk === 'Low' ? 'bg-green-900 text-green-400' : 'bg-yellow-900 text-yellow-400'}">
                            Risk: ${risk}
                        </span>
                    </div>
                    <div class="flex justify-center mb-6">
                        <div class="radar-container">
                            <canvas id="chart-${sid}"></canvas>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <p class="text-xs text-slate-500 uppercase mb-1">推薦理由</p>
                            <ul class="text-sm text-slate-300 space-y-1">
                                ${reasons.map(r => `<li>✅ ${r}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="p-3 bg-slate-800 rounded-lg border-l-4 border-sky-500">
                            <p class="text-xs text-sky-400 uppercase font-bold mb-1">🤖 AI 深度洞察</p>
                            <p class="text-sm text-slate-300 italic">${insight}</p>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                renderChart(stock);
            });
        }

        function renderChart(stock) {
            const canvas = document.getElementById('chart-' + stock.id);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const data = stock.scores ? Object.values(stock.scores) : [0, 0, 0, 0];
            
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['基本面', '技術面', '籌碼面', '消息面'],
                    datasets: [{
                        label: 'Score',
                        data: data,
                        backgroundColor: 'rgba(56, 189, 248, 0.2)',
                        borderColor: 'rgba(56, 189, 248, 1)',
                        borderWidth: 2,
                        pointBackgroundColor: 'rgba(56, 189, 248, 1)'
                    }]
                },
                options: {
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: { color: '#94a3b8', font: { size: 12 } },
                            ticks: { display: false },
                            suggestedMin: 0,
                            suggestedMax: 100
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }
        window.onload = renderCards;
    </script>
</body>
</html>
