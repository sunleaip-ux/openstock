
        <!DOCTYPE html>
        <html lang="zh-TW">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>OpenStock AI | 量化選股儀表板</title>
            <script src="https://cdn.tailwindcss.com"></script>
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
            <style>
                body { background-color: #0f172a; color: #f8fafc; }
                .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
                .radar-container { position: relative; height: 250px; width: 250px; }
            </style>
        </head>
        <body class="p-4 md:p-8">
            <div class="max-w-6xl mx-auto">
                <header class="flex justify-between items-center mb-8">
                    <div>
                        <h1 class="text-3xl font-bold text-sky-400">OpenStock AI</h1>
                        <p class="text-slate-400">量化選股分析報告 | 市場狀態: <span class="text-green-400">Bullish</span></p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-slate-500 uppercase">Last Update</p>
                        <p class="text-sm font-mono">2026-05-02 23:55</p>
                    </div>
                </header>
                <div id="stock-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>
            <script>
                const stocks = [{"id": "2330", "name": "台積電", "total_score": 30.0, "scores": {"fundamental": 100, "technical": 0, "chip": 0, "ai": 0}, "ai_insight": "AI分析暫時不可用"}, {"id": "2454", "name": "聯發科", "total_score": 54.0, "scores": {"fundamental": 50, "technical": 0, "chip": 100, "ai": 70}, "ai_insight": "聯發科（2454）：\n\n* 主要經營 ARM 設計晶片事業，占業收入的80%以上。\n* 客戶集中在行動裝置、汽車和工業控制等領域，具有長期穩定的需求。\n* 2020年業績較好，第四季度營收達新台幣434.6億元，同比增長24.7%。\n* 需要注意的是聯發科的獲利率和毛利率較低，且半導體產業具有高度的不確定性。\n\n總體而言，聯發科是台灣半導體產業的一大強者，但需要 careful analysis of its financials and industry trends."}, {"id": "2317", "name": "鴻海", "total_score": 69.0, "scores": {"fundamental": 100, "technical": 0, "chip": 100, "ai": 70}, "ai_insight": "Here's a 50-word analysis of Hon Hai Precision Industry Co., Ltd. (2317.TW):\n\nHon Hai, also known as Foxconn, is a Taiwan-based electronics manufacturer and one of the world's largest contract manufacturers. With strong relationships with Apple, Amazon, and other major tech companies, it benefits from their growth. Its diverse product portfolio, including smart home devices and automotive parts, reduces reliance on any single sector."}, {"id": "2388", "name": "富邦金", "total_score": 54.0, "scores": {"fundamental": 50, "technical": 100, "chip": 0, "ai": 70}, "ai_insight": "🔍 Analysis of Fubon Financial (2388.TW) Investment Insights:\n\n* Strong balance sheet with low debt-to-equity ratio\n* Diversified loan portfolio and stable asset quality\n* Core business in consumer finance, credit cards, and mortgages\n* Robust capital adequacy to support growth initiatives\n* Valuation attractive at a reasonable PE multiple\n* Potential for dividend yield and share price appreciation"}, {"id": "2881", "name": "台中商業銀行", "total_score": 14.0, "scores": {"fundamental": 0, "technical": 0, "chip": 0, "ai": 70}, "ai_insight": "Based on the financial statements and industry trends, here are some key investment insights for Taichung Commercial Bank (2881):\n\n**Strengths:**\n\n* Strong asset quality with low NPL ratio (<2%)\n* Robust capital adequacy ratio (>15%)\n* Diversified loan portfolio with a focus on small-to-medium enterprises\n\n**Weaknesses:**\n\n* Net interest margin declining due to increasing competition\n* Low profitability compared to peers\n\n**Opportunities:**\n\n* Growing demand for digital banking services and fintech partnerships\n* Increasing investment in Taiwan's emerging industries, such as renewable energy\n\n**Threats:**\n\n* Potential risks from global economic fluctuations\n* Intensifying competition from other banks and financial institutions"}];
                function renderCards() {
                    const container = document.getElementById('stock-cards');
                    stocks.forEach(stock => {
                        const card = document.createElement('div');
                        card.className = 'glass p-6 rounded-2xl shadow-xl';
                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h2 class="text-xl font-bold text-white">${stock.name} <span class="text-sm font-normal text-slate-400">(${stock.id})</span></h2>
                                    <div class="text-3xl font-black text-sky-400 mt-1">${stock.score} <span class="text-sm font-normal text-slate-500">/ 100</span></div>
                                </div>
                                <span class="px-3 py-1 rounded-full text-xs font-bold ${stock.risk === 'Low' ? 'bg-green-900 text-green-400' : 'bg-yellow-900 text-yellow-400'}">
                                    Risk: ${stock.risk}
                                </span>
                            </div>
                            <div class="flex justify-center mb-6">
                                <div class="radar-container">
                                    <canvas id="chart-${stock.id}"></canvas>
                                </div>
                            </div>
                            <div class="space-y-4">
                                <div>
                                    <p class="text-xs text-slate-500 uppercase mb-1">推薦理由</p>
                                    <ul class="text-sm text-slate-300 space-y-1">
                                        ${stock.reasons.map(r => `<li>✅ ${r}</li>`).join('')}
                                    </ul>
                                </div>
                                <div class="p-3 bg-slate-800 rounded-lg border-l-4 border-sky-500">
                                    <p class="text-xs text-sky-400 uppercase font-bold mb-1">🤖 AI 深度洞察</p>
                                    <p class="text-sm text-slate-300 italic">${stock.ai_insight}</p>
                                </div>
                            </div>
                        `;
                        container.appendChild(card);
                        renderChart(stock);
                    });
                }
                function renderChart(stock) {
                    const ctx = document.getElementById('chart-' + stock.id).getContext('2d');
                    new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['基本面', '技術面', '籌碼面', '消息面'],
                            datasets: [{
                                label: 'Score',
                                data: stock.component_scores,
                                backgroundColor: 'rgba(56, 189, 248, 0.2)',
                                borderColor: 'rgba(56, 189, 248, 1)',
                                borderWidth: 2,
                                pointBackgroundColor: 'rgba(56, 189, 248, 1)'
                            }]
                        },
                        options: {
                            scales: {
                                r: {
                                    angleLines: { color: 'rgba(255,255,255,0.1)' },
                                    grid: { color: 'rgba(255,255,255,0.1)' },
                                    pointLabels: { color: '#94a3b8', font: { size: 12 } },
                                    ticks: { display: false },
                                    suggestedMin: 0,
                                    suggestedMax: 100
                                }
                            },
                            plugins: { legend: { display: false } }
                        }
                    });
                }
                window.onload = renderCards;
            </script>
        </body>
        </html>
