<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenStock AI | 量化選股儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .radar-container { position: relative; height: 250px; width: 250px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-sky-400">OpenStock AI</h1>
                <p class="text-slate-400">量化選股分析報告 | 市場狀態: <span class="text-green-400">Bullish</span></p>
            </div>
            <div class="text-right">
                <p class="text-xs text-slate-500 uppercase">Last Update</p>
                <p class="text-sm font-mono">2026-05-03 00:08</p>
            </div>
        </header>
        <div id="stock-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>
    <script>
        const stocks = [{"id": "2330", "name": "台積電", "total_score": 54.0, "scores": {"fundamental": 50, "technical": 100, "chip": 0, "ai": 70}, "ai_insight": "台積電(2330)：短期看似疲弱，但長期仍維持強勢。晶片需求旺盛、5G/AI推動半導體需求增長，台積電的領先地位和高附加值產品將繼續帶來獲利。投資建議：中到長期持有或增加持股。", "reasons": ["基本面尚可", "技術趨勢強勢", "籌碼面流出"], "risk": "Medium"}, {"id": "2454", "name": "聯發科", "total_score": 44.0, "scores": {"fundamental": 100, "technical": 0, "chip": 0, "ai": 70}, "ai_insight": "聯發科(2454) :\n\n* 長期成長趨勢維持，繼續領先業界競爭\n* 5G 和 AI 推動半導體需求增加，聯發科具備優秀的技術和設計能力\n* 股價波動主要受業界整體變化和季節性因素影響，短期風險較高", "reasons": ["基本面極其強勁", "技術面疲弱", "籌碼面流出"], "risk": "Medium"}, {"id": "2317", "name": "鴻海", "total_score": 44.0, "scores": {"fundamental": 100, "technical": 0, "chip": 0, "ai": 70}, "ai_insight": "鴻海股價呈現強勢上漲趋勢，MACD金叉強度高，短期看法 Bullish。中期走勢受惠於供應鏈改善、客戶需求增加和新興產業的成長潛力。警戒點在於股本稅率調整可能導致獲利下滑，但短期內仍有購買機會。", "reasons": ["基本面極其強勁", "技術面疲弱", "籌碼面流出"], "risk": "Medium"}, {"id": "2388", "name": "富邦金", "total_score": 29.0, "scores": {"fundamental": 50, "technical": 0, "chip": 0, "ai": 70}, "ai_insight": "富邦金(2388)的投資洞察是：近期營收仍然強勁，但利率上升可能對業績造成一定影響。目前PB 1.4倍，PE 12.6倍，股價趨勢維持中性。建议觀望待機，以利率變化為考量。", "reasons": ["基本面尚可", "技術面疲弱", "籌碼面流出"], "risk": "Medium"}, {"id": "2881", "name": "台中商業銀行", "total_score": 54.0, "scores": {"fundamental": 50, "technical": 0, "chip": 100, "ai": 70}, "ai_insight": "基于量化分析，台中商業銀行的股票表現顯示：\n\n* 近期股價上漲趨勢可能持續，因為ROE逐步改善\n* 財務強度佳，資產負債率低於5%\n* 股息回報率高於8%，吸引投資者\n\n總體而言，台中商業銀行是一支穩健的股票選擇。", "reasons": ["基本面尚可", "技術面疲弱", "籌碼面強力買入"], "risk": "Medium"}];
        
        function renderCards() {
            const container = document.getElementById('stock-cards');
            if (!stocks || stocks.length === 0) {
                container.innerHTML = '<p class="text-center col-span-full text-slate-500">目前無分析數據，請重新執行掃描。</p>';
                return;
            }
            
            stocks.forEach(stock => {
                const card = document.createElement('div');
                card.className = 'glass p-6 rounded-2xl shadow-xl';
                
                // Use safe defaults for all variables
                const name = stock.name || '未知個股';
                const sid = stock.id || 'N/A';
                const score = stock.total_score || 0;
                const risk = stock.risk || 'Medium';
                const reasons = stock.reasons || ['無具體理由'];
                const insight = stock.ai_insight || 'AI 分析暫時不可用';
                const component_scores = stock.scores ? Object.values(stock.scores) : [0, 0, 0, 0];

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h2 class="text-xl font-bold text-white">${name} <span class="text-sm font-normal text-slate-400">(${sid})</span></h2>
                            <div class="text-3xl font-black text-sky-400 mt-1">${score} <span class="text-sm font-normal text-slate-500">/ 100</span></div>
                        </div>
                        <span class="px-3 py-1 rounded-full text-xs font-bold ${risk === 'Low' ? 'bg-green-900 text-green-400' : 'bg-yellow-900 text-yellow-400'}">
                            Risk: ${risk}
                        </span>
                    </div>
                    <div class="flex justify-center mb-6">
                        <div class="radar-container">
                            <canvas id="chart-${sid}"></canvas>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <p class="text-xs text-slate-500 uppercase mb-1">推薦理由</p>
                            <ul class="text-sm text-slate-300 space-y-1">
                                ${reasons.map(r => `<li>✅ ${r}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="p-3 bg-slate-800 rounded-lg border-l-4 border-sky-500">
                            <p class="text-xs text-sky-400 uppercase font-bold mb-1">🤖 AI 深度洞察</p>
                            <p class="text-sm text-slate-300 italic">${insight}</p>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                renderChart(stock);
            });
        }

        function renderChart(stock) {
            const canvas = document.getElementById('chart-' + stock.id);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const data = stock.scores ? Object.values(stock.scores) : [0, 0, 0, 0];
            
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['基本面', '技術面', '籌碼面', '消息面'],
                    datasets: [{
                        label: 'Score',
                        data: data,
                        backgroundColor: 'rgba(56, 189, 248, 0.2)',
                        borderColor: 'rgba(56, 189, 248, 1)',
                        borderWidth: 2,
                        pointBackgroundColor: 'rgba(56, 189, 248, 1)'
                    }]
                },
                options: {
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: { color: '#94a3b8', font: { size: 12 } },
                            ticks: { display: false },
                            suggestedMin: 0,
                            suggestedMax: 100
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }
        window.onload = renderCards;
    </script>
</body>
</html>
